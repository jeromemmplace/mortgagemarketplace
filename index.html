<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentation Tracker | Mortgage Marketplace LLC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2f50;
  --navy-dark: #0f1e35;
  --navy-light: #2a4670;
  --gold: #c9a84c;
  --gold-light: #e8d7a0;
  --gold-dark: #a8892e;
  --blue: #4A9EDB;
  --blue-light: #CCE0F5;
  --blue-pale: #EBF3FB;
  --white: #ffffff;
  --gray-50: #f8f9fa;
  --gray-100: #f1f3f5;
  --gray-200: #e9ecef;
  --gray-300: #dee2e6;
  --gray-400: #ced4da;
  --gray-500: #adb5bd;
  --gray-600: #868e96;
  --gray-700: #495057;
  --gray-800: #343a40;
  --gray-900: #212529;
  --green: #2ecc71;
  --green-bg: #eafaf1;
  --orange: #f39c12;
  --orange-bg: #fef9e7;
  --red: #e74c3c;
  --red-bg: #fdedec;
  --purple: #8e44ad;
  --purple-bg: #f4ecf7;
  --teal: #1abc9c;
  --teal-bg: #e8f8f5;
  --pptx-color: #D04423;
  --pptx-bg: #fdeae5;
  --pdf-color: #B30B00;
  --pdf-bg: #fde8e7;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 3px rgba(26,47,80,0.08);
  --shadow-md: 0 4px 12px rgba(26,47,80,0.1);
  --shadow-lg: 0 8px 30px rgba(26,47,80,0.12);
  --transition: 0.2s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--gray-50); color: var(--gray-800);
  line-height: 1.5; -webkit-font-smoothing: antialiased;
}
.top-bar {
  position: sticky; top: 0; z-index: 100;
  background: var(--navy); color: var(--white);
  padding: 16px 32px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(26,47,80,0.25);
}
.top-bar-left { display: flex; align-items: center; gap: 14px; }
.logo-mark {
  width: 38px; height: 38px; background: var(--gold); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: var(--navy-dark);
}
.top-bar h1 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.top-bar .subtitle { font-size: 12px; opacity: 0.7; margin-top: 1px; }
.top-bar-right { display: flex; align-items: center; gap: 12px; }
.btn-top {
  background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
  color: var(--white); padding: 7px 14px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: var(--transition);
}
.btn-top:hover { background: rgba(255,255,255,0.22); }
.btn-top.gold { background: var(--gold); color: var(--navy-dark); border-color: var(--gold); }
.btn-top.gold:hover { background: var(--gold-dark); }
.summary-strip {
  background: var(--white); border-bottom: 1px solid var(--gray-200);
  padding: 18px 32px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
}
.stat-card {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; background: var(--gray-50);
  border: 1px solid var(--gray-200); border-radius: var(--radius-md);
}
.stat-num { font-size: 22px; font-weight: 700; color: var(--navy); font-family: 'Playfair Display', serif; }
.stat-label { font-size: 12px; color: var(--gray-600); line-height: 1.3; }
.toolbar {
  padding: 16px 32px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  background: var(--white); border-bottom: 1px solid var(--gray-200);
}
.search-box { position: relative; flex: 1; min-width: 220px; max-width: 360px; }
.search-box input {
  width: 100%; padding: 9px 14px 9px 36px;
  border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  font-size: 14px; font-family: inherit; background: var(--gray-50); transition: var(--transition);
}
.search-box input:focus { outline: none; border-color: var(--blue); background: var(--white); }
.search-box .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--gray-500); font-size: 15px; pointer-events: none; }
.filter-select {
  padding: 9px 12px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  font-size: 13px; font-family: inherit; background: var(--gray-50); cursor: pointer;
}
.filter-select:focus { outline: none; border-color: var(--blue); }
.toolbar-spacer { flex: 1; }
.btn-action { padding: 9px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: var(--transition); }
.btn-expand { background: var(--gray-100); color: var(--gray-700); border: 1px solid var(--gray-300); }
.btn-expand:hover { background: var(--gray-200); }
.btn-add { background: var(--gold); color: var(--navy-dark); }
.btn-add:hover { background: var(--gold-dark); }
.project-grid { padding: 24px 32px 48px; display: flex; flex-direction: column; gap: 16px; }
.project-card {
  background: var(--white); border: 1px solid var(--gray-200);
  border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
  overflow: hidden; transition: box-shadow 0.2s ease;
}
.project-card:hover { box-shadow: var(--shadow-md); }
.project-card.collapsed .card-body { display: none; }
.card-header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; cursor: pointer; user-select: none; transition: background 0.15s;
}
.card-header:hover { background: var(--gray-50); }
.card-chevron {
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--gray-500); transition: transform 0.25s ease;
}
.project-card.collapsed .card-chevron { transform: rotate(-90deg); }
.card-icon {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  background: var(--navy); display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.card-title-area { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-subtitle { font-size: 12px; color: var(--gray-600); margin-top: 1px; }
.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.badge-complete { background: var(--green-bg); color: #1a8a4a; }
.badge-progress { background: var(--blue-pale); color: #1a6aab; }
.badge-review { background: var(--orange-bg); color: #b37a00; }
.badge-not-started { background: var(--gray-100); color: var(--gray-600); }
.badge-missing { background: var(--red-bg); color: #c0392b; }
.badge-waiting-link { background: var(--purple-bg); color: #6c3483; }
.badge-waiting-approval { background: var(--teal-bg); color: #148f77; }
.progress-bar-wrap { width: 100px; height: 6px; background: var(--gray-200); border-radius: 3px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.card-body { border-top: 1px solid var(--gray-200); }
.tab-strip { display: flex; border-bottom: 1px solid var(--gray-200); background: var(--gray-50); overflow-x: auto; }
.tab-btn {
  padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--gray-600);
  border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; white-space: nowrap; transition: var(--transition);
}
.tab-btn:hover { color: var(--navy); background: var(--gray-100); }
.tab-btn.active { color: var(--navy); border-bottom-color: var(--gold); font-weight: 600; }
.tab-panel { display: none; padding: 20px; }
.tab-panel.active { display: block; }
.overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.ov-field label {
  display: block; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 4px;
}
.ov-field .val { font-size: 14px; color: var(--gray-800); }
.ov-full { grid-column: 1 / -1; }
.ov-notes {
  width: 100%; padding: 10px 12px;
  border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; resize: vertical; min-height: 60px; background: var(--gray-50);
}
.ov-notes:focus { outline: none; border-color: var(--blue); background: var(--white); }

/* DECK FILE CARDS */
.deck-files-strip {
  grid-column: 1 / -1;
  display: flex; gap: 12px; flex-wrap: wrap;
  padding: 14px 0 4px; border-top: 1px solid var(--gray-200); margin-top: 4px;
}
.deck-files-strip > .strip-label {
  width: 100%; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 2px;
}
.deck-file-card {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px; background: var(--gray-50);
  border: 1px solid var(--gray-200); border-radius: var(--radius-md);
  flex: 1; min-width: 240px; transition: var(--transition);
}
.deck-file-card:hover { border-color: var(--gray-400); box-shadow: var(--shadow-sm); }
.file-icon {
  width: 44px; height: 44px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; letter-spacing: -0.3px; flex-shrink: 0;
}
.file-icon.pptx { background: var(--pptx-bg); color: var(--pptx-color); }
.file-icon.pdf { background: var(--pdf-bg); color: var(--pdf-color); }
.file-info { flex: 1; min-width: 0; }
.file-info .file-name { font-size: 13px; font-weight: 600; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-info .file-type { font-size: 11px; color: var(--gray-500); }
.file-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.btn-file {
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
  transition: var(--transition); white-space: nowrap; cursor: pointer; border: none;
}
.btn-file.pptx { background: var(--pptx-color); color: var(--white); }
.btn-file.pptx:hover { background: #b83a1c; }
.btn-file.pdf { background: var(--pdf-color); color: var(--white); }
.btn-file.pdf:hover { background: #8f0900; }
.btn-file.placeholder { background: var(--gray-200); color: var(--gray-500); pointer-events: none; cursor: default; }
.btn-copy-sm { background: none; border: 1px solid var(--gray-300); color: var(--gray-600); padding: 5px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
.btn-copy-sm:hover { background: var(--gray-100); }

/* RESOURCE TABS */
.resource-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.resource-header h4 { font-size: 14px; font-weight: 700; color: var(--navy); }
.resource-list { display: flex; flex-direction: column; gap: 10px; }
.resource-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: var(--gray-50);
  border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
}
.resource-icon {
  width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; flex-shrink: 0;
}
.resource-icon.funnel { background: #dbeafe; color: #2563eb; }
.resource-icon.marketing { background: #fce7f3; color: #db2777; }
.resource-icon.workflow { background: #d1fae5; color: #059669; }
.resource-icon.checkin { background: #fef3c7; color: #d97706; }
.resource-info { flex: 1; min-width: 0; }
.resource-label { font-size: 13px; font-weight: 600; color: var(--gray-800); }
.resource-note { font-size: 11px; color: var(--gray-500); margin-top: 2px; }
.resource-badge { padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
.rb-added { background: var(--green-bg); color: #1a8a4a; }
.rb-missing { background: var(--red-bg); color: #c0392b; }
.rb-review { background: var(--orange-bg); color: #b37a00; }
.rb-draft { background: var(--purple-bg); color: #6c3483; }
.rb-final { background: var(--blue-pale); color: #1a6aab; }
.btn-link {
  padding: 6px 12px; border-radius: var(--radius-sm);
  font-size: 12px; font-weight: 600; text-decoration: none;
  color: var(--white); background: var(--navy);
  display: inline-flex; align-items: center; gap: 5px;
  transition: var(--transition); white-space: nowrap;
}
.btn-link:hover { background: var(--navy-light); }
.btn-link.placeholder { background: var(--gray-200); color: var(--gray-500); cursor: default; pointer-events: none; }
.btn-copy { background: none; border: 1px solid var(--gray-300); color: var(--gray-600); padding: 5px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
.btn-copy:hover { background: var(--gray-100); }
.tab-notes-area { margin-top: 14px; }
.tab-notes-area label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray-500); margin-bottom: 4px; display: block; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(15,30,53,0.6); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--white); border-radius: var(--radius-lg); width: 90%; max-width: 640px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); }
.modal-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--gray-200); background: var(--navy); color: var(--white); border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.modal-head h3 { font-size: 16px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--white); font-size: 20px; cursor: pointer; opacity: 0.7; }
.modal-close:hover { opacity: 1; }
.modal-body { padding: 24px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 5px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-300); border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; background: var(--gray-50); }
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--blue); background: var(--white); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-foot { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--gray-200); }
.btn-cancel { padding: 9px 18px; border: 1px solid var(--gray-300); background: var(--white); color: var(--gray-700); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save { padding: 9px 18px; border: none; background: var(--gold); color: var(--navy-dark); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: var(--gold-dark); }
.fdiv { border: none; border-top: 1px solid var(--gray-200); margin: 18px 0; }
.fsec { font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 12px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); color: var(--white); padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); transform: translateY(80px); opacity: 0; transition: all 0.3s ease; z-index: 300; }
.toast.show { transform: translateY(0); opacity: 1; }
.empty-state { text-align: center; padding: 48px 24px; color: var(--gray-500); }
.empty-state .icon { font-size: 40px; margin-bottom: 12px; }

/* PRINT */
@media print {
  body { background: white; font-size: 11px; }
  .top-bar { position: static; background: white; color: black; box-shadow: none; border-bottom: 2px solid var(--navy); }
  .top-bar h1 { color: var(--navy); }
  .btn-top, .toolbar, .btn-copy, .btn-copy-sm, .modal-overlay, .toast { display: none !important; }
  .project-card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
  .project-card.collapsed .card-body { display: block !important; }
  .card-chevron { display: none; }
  .tab-strip { display: none; }
  .tab-panel { display: block !important; border-top: 1px solid #eee; }
  .tab-panel::before { content: attr(data-tab-label); display: block; font-weight: 700; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; color: var(--navy); }
  .btn-link, .btn-file { color: var(--navy) !important; background: none !important; border: 1px solid #ccc !important; font-size: 10px; }
  .btn-link.placeholder, .btn-file.placeholder { border-style: dashed !important; }
  .summary-strip { border-bottom: 1px solid #ccc; }
  .project-grid { padding: 16px; }
}
@media (max-width: 768px) {
  .top-bar { padding: 12px 16px; flex-wrap: wrap; gap: 8px; }
  .summary-strip { padding: 14px 16px; gap: 12px; }
  .toolbar { padding: 12px 16px; }
  .project-grid { padding: 16px; }
  .overview-grid { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
  .search-box { max-width: 100%; }
  .card-header { padding: 12px 14px; }
  .tab-panel { padding: 14px; }
  .deck-files-strip { flex-direction: column; }
  .deck-file-card { min-width: 0; }
}
</style>
</head>
<body>

<header class="top-bar">
  <div class="top-bar-left">
    <div class="logo-mark">M</div>
    <div>
      <h1>Mortgage Marketplace LLC</h1>
      <div class="subtitle">Presentation Tracker &amp; Resource Hub</div>
    </div>
  </div>
  <div class="top-bar-right">
    <button class="btn-top" onclick="window.print()">&#128438; Print</button>
    <button class="btn-top gold" onclick="openAddModal()">+ Add Presentation</button>
  </div>
</header>

<div class="summary-strip" id="summaryStrip"></div>

<div class="toolbar">
  <div class="search-box">
    <span class="icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="Search presentations..." oninput="applyFilters()">
  </div>
  <select class="filter-select" id="statusFilter" onchange="applyFilters()">
    <option value="">All Statuses</option>
    <option value="Complete">Complete</option>
    <option value="In Progress">In Progress</option>
    <option value="Needs Review">Needs Review</option>
    <option value="Not Started">Not Started</option>
    <option value="Missing Assets">Missing Assets</option>
    <option value="Waiting on Link">Waiting on Link</option>
    <option value="Waiting on Approval">Waiting on Approval</option>
  </select>
  <select class="filter-select" id="categoryFilter" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option value="deck-missing">Missing Deck Files</option>
    <option value="funnel-missing">Missing Funnel</option>
    <option value="marketing-missing">Missing Marketing</option>
    <option value="workflow-missing">Missing Workflow</option>
    <option value="checkin-missing">Missing Check-in</option>
  </select>
  <div class="toolbar-spacer"></div>
  <button class="btn-action btn-expand" onclick="toggleAll(false)">&#9660; Expand All</button>
  <button class="btn-action btn-expand" onclick="toggleAll(true)">&#9650; Collapse All</button>
</div>

<div class="project-grid" id="projectGrid"></div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Add New Presentation</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Presentation Title</label><input type="text" id="fTitle" placeholder="e.g. YouTube Secrets for Real Estate"></div>
      <div class="form-group"><label>Short Description</label><input type="text" id="fDesc" placeholder="Brief description of this class"></div>
      <div class="form-row">
        <div class="form-group"><label>Owner</label><input type="text" id="fOwner" value="Mike Gillett"></div>
        <div class="form-group"><label>Status</label>
          <select id="fStatus"><option>Complete</option><option>In Progress</option><option>Needs Review</option><option>Not Started</option><option>Missing Assets</option><option>Waiting on Link</option><option>Waiting on Approval</option></select>
        </div>
      </div>
      <div class="form-group"><label>Emoji Icon</label><input type="text" id="fIcon" value="&#128218;" maxlength="4" style="width:60px;"></div>

      <hr class="fdiv"><p class="fsec">PRESENTATION FILES (PPTX &amp; PDF)</p>
      <div class="form-row">
        <div class="form-group"><label>PPTX File URL</label><input type="url" id="fDeckPptx" placeholder="https://..."></div>
        <div class="form-group"><label>PDF File URL</label><input type="url" id="fDeckPdf" placeholder="https://..."></div>
      </div>

      <hr class="fdiv"><p class="fsec">FUNNEL RESOURCES</p>
      <div class="form-row">
        <div class="form-group"><label>Landing Page URL</label><input type="url" id="fFunnelLanding" placeholder="https://..."></div>
        <div class="form-group"><label>Thank You Page URL</label><input type="url" id="fFunnelThanks" placeholder="https://..."></div>
      </div>

      <hr class="fdiv"><p class="fsec">MARKETING MATERIALS</p>
      <div class="form-row">
        <div class="form-group"><label>Email Banners URL</label><input type="url" id="fMktBanners" placeholder="https://..."></div>
        <div class="form-group"><label>Social Graphics URL</label><input type="url" id="fMktSocial" placeholder="https://..."></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Email/SMS Copy URL</label><input type="url" id="fMktCopy" placeholder="https://..."></div>
        <div class="form-group"><label>Slide Deck URL</label><input type="url" id="fMktDeck" placeholder="https://..."></div>
      </div>

      <hr class="fdiv"><p class="fsec">WORKFLOW INSIDE THE CRM</p>
      <div class="form-row">
        <div class="form-group"><label>Workflow Link/Export</label><input type="url" id="fWfLink" placeholder="https://..."></div>
        <div class="form-group"><label>Automation Doc URL</label><input type="url" id="fWfDoc" placeholder="https://..."></div>
      </div>

      <hr class="fdiv"><p class="fsec">CHECK-IN FORMS</p>
      <div class="form-row">
        <div class="form-group"><label>Check-in Page URL</label><input type="url" id="fCiPage" placeholder="https://..."></div>
        <div class="form-group"><label>Form Link</label><input type="url" id="fCiForm" placeholder="https://..."></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="savePresentation()">Save Presentation</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TITLES = [
  'YouTube Secrets for Real Estate','LinkedIn for Real Estate Agents','Instagram for Real Estate Agents',
  'VA Home Loans','Database Marketing','Business Planning','12 Week Year','Down Payment Assistance',
  'Investor Financing','Renovation Loans','AI for Realtors','Facebook Marketing/Lead Gen','Getting Found in AI Search'
];
const DESCS = [
  'Build and grow a YouTube channel that generates real estate leads.',
  'Leverage LinkedIn to connect with referral partners and clients.',
  'Use Instagram to build your brand and attract local buyers and sellers.',
  'VA loan program education for realtors working with veterans.',
  'Turn your existing database into a consistent lead generation engine.',
  'Annual and quarterly planning framework for real estate professionals.',
  'Implement the 12 Week Year productivity system for agents.',
  'Down payment assistance programs realtors should know.',
  'Financing strategies for real estate investors.',
  'Renovation and rehab loan options for buyers and investors.',
  'AI tools and workflows to save time and win more deals.',
  'Facebook ad strategies and lead generation for real estate.',
  'How to optimize for AI search engines as a real estate professional.'
];
const ICONS = ['\u{1F3AC}','\u{1F517}','\u{1F4F7}','\u{1F393}','\u{1F4C8}','\u{1F4CB}','\u{1F4C5}','\u{1F4B0}','\u{1F4BC}','\u{1F3E0}','\u{1F916}','\u{1F4F0}','\u{1F50D}'];

let presentations = TITLES.map((t,i) => ({
  id:'p'+i, title:t, description:DESCS[i], icon:ICONS[i],
  owner:'Mike Gillett', status:'Complete',
  lastUpdated: new Date().toISOString().slice(0,10),
  notes:'', nextAction:'', missingItems:'',
  deck: {
    pptx: { url:'', status:'Added', notes:'Placeholder' },
    pdf:  { url:'', status:'Added', notes:'Placeholder' }
  },
  funnel:    { status:'Final', notes:'', resources:[ {label:'Landing Page',url:'',status:'Added',notes:'Placeholder'}, {label:'Thank You Page',url:'',status:'Added',notes:'Placeholder'} ] },
  marketing: { status:'Final', notes:'', resources:[ {label:'Email Banners',url:'',status:'Added',notes:'Placeholder'}, {label:'Social Graphics',url:'',status:'Added',notes:'Placeholder'}, {label:'Email/SMS Copy',url:'',status:'Added',notes:'Placeholder'}, {label:'Slide Deck',url:'',status:'Added',notes:'Placeholder'} ] },
  workflow:  { status:'Final', notes:'', resources:[ {label:'Workflow Link',url:'',status:'Added',notes:'Placeholder'}, {label:'Automation Doc',url:'',status:'Added',notes:'Placeholder'} ] },
  checkin:   { status:'Final', notes:'', resources:[ {label:'Check-in Page',url:'',status:'Added',notes:'Placeholder'}, {label:'Form Link',url:'',status:'Added',notes:'Placeholder'} ] }
}));

// HELPERS
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function statusBadge(s){const m={'Complete':'badge-complete','In Progress':'badge-progress','Needs Review':'badge-review','Not Started':'badge-not-started','Missing Assets':'badge-missing','Waiting on Link':'badge-waiting-link','Waiting on Approval':'badge-waiting-approval'};return '<span class="badge '+(m[s]||'badge-not-started')+'">'+s+'</span>';}
function resBadge(s){const m={'Added':'rb-added','Missing':'rb-missing','Needs Review':'rb-review','Draft':'rb-draft','Final':'rb-final'};return '<span class="resource-badge '+(m[s]||'rb-draft')+'">'+s+'</span>';}
function countAll(p){return 2+p.funnel.resources.length+p.marketing.resources.length+p.workflow.resources.length+p.checkin.resources.length;}
function countLinked(p){let c=0;if(p.deck.pptx.url)c++;if(p.deck.pdf.url)c++;[p.funnel,p.marketing,p.workflow,p.checkin].forEach(cat=>c+=cat.resources.filter(r=>r.url).length);return c;}
function pct(p){const t=countAll(p),f=countLinked(p);return t?Math.round(f/t*100):0;}

// RENDER
function renderAll(){renderSummary();renderGrid();}
function renderSummary(){
  const t=presentations.length,c=presentations.filter(p=>p.status==='Complete').length,ip=presentations.filter(p=>p.status==='In Progress').length,nr=presentations.filter(p=>p.status==='Needs Review').length;
  const ta=presentations.reduce((s,p)=>s+countAll(p),0),lk=presentations.reduce((s,p)=>s+countLinked(p),0);
  document.getElementById('summaryStrip').innerHTML=
    '<div class="stat-card"><div class="stat-num">'+t+'</div><div class="stat-label">Total<br>Presentations</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--green);">'+c+'</div><div class="stat-label">Complete</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--blue);">'+ip+'</div><div class="stat-label">In Progress</div></div>'+
    '<div class="stat-card"><div class="stat-num" style="color:var(--orange);">'+nr+'</div><div class="stat-label">Needs Review</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+lk+'</div><div class="stat-label">Assets<br>Linked</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+(ta-lk)+'</div><div class="stat-label">Assets<br>Pending</div></div>';
}

function deckCard(file,type,title){
  const ph=!file.url,ext=type.toUpperCase(),name=title.replace(/[^a-zA-Z0-9 ]/g,'').replace(/ /g,'-');
  const ico=type==='pptx'?'\u{1F4CA}':'\u{1F4C4}';
  const btn=ph?'<span class="btn-file placeholder">'+ico+' Placeholder</span>':'<a class="btn-file '+type+'" href="'+file.url+'" target="_blank" rel="noopener">'+ico+' Download '+ext+'</a><button class="btn-copy-sm" onclick="event.stopPropagation();copyLink(\''+file.url.replace(/'/g,"\\'")+'\')">Copy</button>';
  return '<div class="deck-file-card"><div class="file-icon '+type+'">'+ext+'</div><div class="file-info"><div class="file-name">'+esc(name)+'.'+type+'</div><div class="file-type">'+ext+' Presentation File</div></div><div class="file-actions">'+resBadge(file.status)+' '+btn+'</div></div>';
}

function resRow(r,type){
  const ph=!r.url,icons={funnel:'\u26A1',marketing:'\u{1F3A8}',workflow:'\u2699',checkin:'\u2611'};
  const btn=ph?'<span class="btn-link placeholder">\u{1F517} Placeholder</span>':'<a class="btn-link" href="'+r.url+'" target="_blank" rel="noopener">\u{1F517} Open</a><button class="btn-copy" onclick="event.stopPropagation();copyLink(\''+r.url.replace(/'/g,"\\'")+'\')">Copy</button>';
  return '<div class="resource-row"><div class="resource-icon '+type+'">'+(icons[type]||'\u2611')+'</div><div class="resource-info"><div class="resource-label">'+esc(r.label)+'</div><div class="resource-note">'+(r.notes||'No notes')+'</div></div>'+resBadge(r.status)+' '+btn+'</div>';
}

function renderCard(p){
  const pc=pct(p),col=pc===100?'var(--green)':'var(--blue)';
  return '<div class="project-card collapsed" id="card-'+p.id+'" data-status="'+p.status+'" data-title="'+p.title.toLowerCase()+'">'+
  '<div class="card-header" onclick="toggleCard(\''+p.id+'\')">'+
    '<div class="card-chevron">\u25BC</div>'+
    '<div class="card-icon">'+p.icon+'</div>'+
    '<div class="card-title-area"><div class="card-title">'+esc(p.title)+'</div><div class="card-subtitle">'+esc(p.owner)+' \u00B7 Updated '+p.lastUpdated+'</div></div>'+
    statusBadge(p.status)+
    '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:'+pc+'%;background:'+col+'"></div></div>'+
    '<span style="font-size:11px;color:var(--gray-500);min-width:36px;text-align:right;">'+pc+'%</span>'+
  '</div>'+
  '<div class="card-body">'+
    '<div class="tab-strip">'+
      '<button class="tab-btn active" onclick="switchTab(this,\''+p.id+'\',\'overview\')">Overview</button>'+
      '<button class="tab-btn" onclick="switchTab(this,\''+p.id+'\',\'funnel\')">\u26A1 Funnel</button>'+
      '<button class="tab-btn" onclick="switchTab(this,\''+p.id+'\',\'marketing\')">\u{1F3A8} Marketing</button>'+
      '<button class="tab-btn" onclick="switchTab(this,\''+p.id+'\',\'workflow\')">\u2699 Workflow</button>'+
      '<button class="tab-btn" onclick="switchTab(this,\''+p.id+'\',\'checkin\')">\u2611 Check-in Forms</button>'+
    '</div>'+
    // OVERVIEW
    '<div class="tab-panel active" id="tab-'+p.id+'-overview" data-tab-label="Overview">'+
      '<div class="overview-grid">'+
        '<div class="ov-field"><label>Title</label><div class="val">'+esc(p.title)+'</div></div>'+
        '<div class="ov-field"><label>Owner</label><div class="val">'+esc(p.owner)+'</div></div>'+
        '<div class="ov-field ov-full"><label>Description</label><div class="val">'+esc(p.description)+'</div></div>'+
        '<div class="ov-field"><label>Status</label><div class="val">'+statusBadge(p.status)+'</div></div>'+
        '<div class="ov-field"><label>Last Updated</label><div class="val">'+p.lastUpdated+'</div></div>'+
        '<div class="deck-files-strip"><div class="strip-label">Presentation Files</div>'+deckCard(p.deck.pptx,'pptx',p.title)+deckCard(p.deck.pdf,'pdf',p.title)+'</div>'+
        '<div class="ov-field ov-full"><label>Notes</label><textarea class="ov-notes" placeholder="Add notes..." oninput="updateField(\''+p.id+'\',\'notes\',this.value)">'+esc(p.notes)+'</textarea></div>'+
        '<div class="ov-field"><label>Missing Items</label><textarea class="ov-notes" style="min-height:40px" placeholder="List missing items..." oninput="updateField(\''+p.id+'\',\'missingItems\',this.value)">'+esc(p.missingItems)+'</textarea></div>'+
        '<div class="ov-field"><label>Next Action</label><textarea class="ov-notes" style="min-height:40px" placeholder="Next action..." oninput="updateField(\''+p.id+'\',\'nextAction\',this.value)">'+esc(p.nextAction)+'</textarea></div>'+
      '</div>'+
    '</div>'+
    // FUNNEL
    '<div class="tab-panel" id="tab-'+p.id+'-funnel" data-tab-label="Funnel">'+
      '<div class="resource-header"><h4>\u26A1 Funnel Resources</h4>'+resBadge(p.funnel.status)+'</div>'+
      '<div class="resource-list">'+p.funnel.resources.map(r=>resRow(r,'funnel')).join('')+'</div>'+
      '<div class="tab-notes-area"><label>Funnel Notes</label><textarea class="ov-notes" placeholder="Add funnel notes..." oninput="updateCatField(\''+p.id+'\',\'funnel\',\'notes\',this.value)">'+esc(p.funnel.notes)+'</textarea></div>'+
    '</div>'+
    // MARKETING
    '<div class="tab-panel" id="tab-'+p.id+'-marketing" data-tab-label="Marketing Materials">'+
      '<div class="resource-header"><h4>\u{1F3A8} Marketing Materials</h4>'+resBadge(p.marketing.status)+'</div>'+
      '<div class="resource-list">'+p.marketing.resources.map(r=>resRow(r,'marketing')).join('')+'</div>'+
      '<div class="tab-notes-area"><label>Marketing Notes</label><textarea class="ov-notes" placeholder="Add marketing notes..." oninput="updateCatField(\''+p.id+'\',\'marketing\',\'notes\',this.value)">'+esc(p.marketing.notes)+'</textarea></div>'+
    '</div>'+
    // WORKFLOW
    '<div class="tab-panel" id="tab-'+p.id+'-workflow" data-tab-label="Workflow inside the CRM">'+
      '<div class="resource-header"><h4>\u2699 Workflow inside the CRM</h4>'+resBadge(p.workflow.status)+'</div>'+
      '<div class="resource-list">'+p.workflow.resources.map(r=>resRow(r,'workflow')).join('')+'</div>'+
      '<div class="tab-notes-area"><label>Workflow Notes</label><textarea class="ov-notes" placeholder="Add workflow notes..." oninput="updateCatField(\''+p.id+'\',\'workflow\',\'notes\',this.value)">'+esc(p.workflow.notes)+'</textarea></div>'+
    '</div>'+
    // CHECKIN
    '<div class="tab-panel" id="tab-'+p.id+'-checkin" data-tab-label="Check-in Forms">'+
      '<div class="resource-header"><h4>\u2611 Check-in Forms</h4>'+resBadge(p.checkin.status)+'</div>'+
      '<div class="resource-list">'+p.checkin.resources.map(r=>resRow(r,'checkin')).join('')+'</div>'+
      '<div class="tab-notes-area"><label>Check-in Notes</label><textarea class="ov-notes" placeholder="Add check-in notes..." oninput="updateCatField(\''+p.id+'\',\'checkin\',\'notes\',this.value)">'+esc(p.checkin.notes)+'</textarea></div>'+
    '</div>'+
  '</div></div>';
}

function renderGrid(){
  const g=document.getElementById('projectGrid');
  if(!presentations.length){g.innerHTML='<div class="empty-state"><div class="icon">\u{1F4DA}</div><p>No presentations yet.</p></div>';return;}
  g.innerHTML=presentations.map(p=>renderCard(p)).join('');
  applyFilters();
}

// INTERACTIONS
function toggleCard(id){document.getElementById('card-'+id).classList.toggle('collapsed');}
function toggleAll(c){document.querySelectorAll('.project-card').forEach(el=>{c?el.classList.add('collapsed'):el.classList.remove('collapsed');});}
function switchTab(btn,pid,tab){
  const card=document.getElementById('card-'+pid);
  card.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  card.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+pid+'-'+tab).classList.add('active');
}
function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sf=document.getElementById('statusFilter').value;
  const cf=document.getElementById('categoryFilter').value;
  document.querySelectorAll('.project-card').forEach(c=>{
    const title=c.dataset.title,status=c.dataset.status,pid=c.id.replace('card-','');
    const p=presentations.find(x=>x.id===pid);
    let show=true;
    if(q&&!title.includes(q))show=false;
    if(sf&&status!==sf)show=false;
    if(cf&&p){
      if(cf==='deck-missing'){if(p.deck.pptx.url||p.deck.pdf.url)show=false;}
      else{const cat=cf.split('-')[0];const d=p[cat];if(d&&!d.resources.every(r=>!r.url))show=false;}
    }
    c.style.display=show?'':'none';
  });
}
function updateField(id,f,v){const p=presentations.find(x=>x.id===id);if(p)p[f]=v;}
function updateCatField(id,cat,f,v){const p=presentations.find(x=>x.id===id);if(p&&p[cat])p[cat][f]=v;}
function copyLink(url){navigator.clipboard.writeText(url).then(()=>showToast('Link copied'));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// MODAL
function openAddModal(){
  document.getElementById('modalTitle').textContent='Add New Presentation';
  document.getElementById('fTitle').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fOwner').value='Mike Gillett';
  document.getElementById('fStatus').value='Complete';
  document.getElementById('fIcon').value='\u{1F4DA}';
  document.querySelectorAll('.modal input[type="url"]').forEach(i=>i.value='');
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}
function savePresentation(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('Title is required');return;}
  const v=id=>document.getElementById(id).value.trim();
  const mk=(label,url)=>({label,url,status:'Added',notes:url?'':'Placeholder'});
  const df=(url)=>({url,status:'Added',notes:url?'':'Placeholder'});
  presentations.push({
    id:'p'+Date.now(),title,description:v('fDesc'),icon:v('fIcon')||'\u{1F4DA}',
    owner:v('fOwner')||'Mike Gillett',status:v('fStatus'),
    lastUpdated:new Date().toISOString().slice(0,10),
    notes:'',nextAction:'',missingItems:'',
    deck:{pptx:df(v('fDeckPptx')),pdf:df(v('fDeckPdf'))},
    funnel:{status:'Final',notes:'',resources:[mk('Landing Page',v('fFunnelLanding')),mk('Thank You Page',v('fFunnelThanks'))]},
    marketing:{status:'Final',notes:'',resources:[mk('Email Banners',v('fMktBanners')),mk('Social Graphics',v('fMktSocial')),mk('Email/SMS Copy',v('fMktCopy')),mk('Slide Deck',v('fMktDeck'))]},
    workflow:{status:'Final',notes:'',resources:[mk('Workflow Link',v('fWfLink')),mk('Automation Doc',v('fWfDoc'))]},
    checkin:{status:'Final',notes:'',resources:[mk('Check-in Page',v('fCiPage')),mk('Form Link',v('fCiForm'))]}
  });
  closeModal();renderAll();showToast('Added: '+title);
}

renderAll();
</script>
</body>
</html>
